<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FDTI 人格测试</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
    <div class="brand">FuDan Type Indicator</div>
    <h1>FDTI</h1>
</header>

<main>
    <section id="intro" class="screen active">
        <h2>SBTI 已经过时，FDTI 来了。</h2>
        <p class="desc">一题一题作答，没有对错，只有你当下的本能。</p>
        <p class="desc">选择后自动跳转下一题，约 5 分钟完成。</p>
        <button id="startBtn" class="btn-primary">开始测试</button>
        <p class="author">
            原作者：
            <a href="https://space.bilibili.com/417038183" target="_blank" rel="noreferrer">B站@蛆肉儿串儿</a>
            <br>
            仓库地址：
            <a href="https://github.com/LinearSakana/fdti-pages" target="_blank" rel="noreferrer">GitHub</a>
        </p>
    </section>

    <section id="test" class="screen">
        <div class="progress-wrap">
            <div class="progress-bar">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">1 / 31</div>
        </div>
        <div id="testHint" class="hint">选择一个选项后会自动进入下一题。</div>
        <div id="questionList"></div>
        <div class="quiz-actions">
            <button id="backPrevBtn" class="btn-secondary">返回上一题</button>
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
        </div>
    </section>

    <section id="result" class="screen">
        <div class="result-card">
            <div class="top-info">
                <div id="resultModeKicker" class="type-kicker">你的主类型</div>
                <div id="resultTypeName" class="type-name">FDUER</div>
                <div id="matchBadge" class="match">匹配度 92%</div>
                <div id="resultTypeSub" class="type-subname">系统备注会显示在这里。</div>
            </div>

            <div id="posterBox" class="poster-box">
                <img id="posterImage" class="poster-image" alt="人格结果图" src="image/NPC.png"/>
                <div id="posterCaption" class="poster-caption">鉴定为典型的复旦人</div>
            </div>

            <div class="analysis-box">
                <h3>该人格的简单解读</h3>
                <p id="resultDesc"></p>
            </div>

            <div class="dim-box">
                <h3>十五维度评分</h3>
                <div id="dimList" class="dim-list"></div>
            </div>

            <div class="note-box">
                <h3>友情提示</h3>
                <p id="funNote">仅供娱乐</p>
            </div>
        </div>

        <div class="result-actions">
            <button id="toTopBtn" class="btn-primary">回到首页</button>
        </div>
    </section>
</main>

<script src="./quiz.data.js"></script>
<script src="./index.quiz.js"></script>
</body>
</html>
