<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJTI — 测测你是哪种交大人</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8102E;--dark:#12121f;--mid:#1c1c30;--card:#232340;
  --accent:#e94560;--gold:#f5a623;--text:#eaeaea;--muted:#7788aa;--radius:14px;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* Header */
header{width:100%;background:linear-gradient(135deg,var(--red) 0%,#7b0020 100%);padding:22px 24px 18px;text-align:center;box-shadow:0 4px 24px rgba(200,16,46,.45)}
header .brand{font-size:12px;letter-spacing:3px;opacity:.75;margin-bottom:4px}
header h1{font-size:44px;font-weight:900;letter-spacing:6px}
header .sub{font-size:14px;margin-top:6px;opacity:.88}

main{width:100%;max-width:680px;padding:28px 18px 80px}

/* Screens */
.screen{display:none}.screen.active{display:block}

/* Intro */
#intro{text-align:center;padding-top:20px}
#intro h2{font-size:26px;font-weight:700;margin-bottom:14px;line-height:1.45}
#intro .desc{color:var(--muted);font-size:15px;line-height:1.85;margin-bottom:8px}
#intro .note{font-size:12px;color:var(--muted);margin-top:20px}

.btn-primary{
  display:inline-block;background:linear-gradient(135deg,var(--red),var(--accent));
  color:#fff;font-size:17px;font-weight:700;padding:15px 52px;border-radius:999px;
  border:none;cursor:pointer;margin-top:28px;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(233,69,96,.4);transition:transform .15s,box-shadow .15s
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(233,69,96,.5)}

/* Progress */
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.progress-bar{flex:1;height:5px;background:var(--card);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--accent));border-radius:999px;transition:width .35s ease}
.progress-text{font-size:12px;color:var(--muted);white-space:nowrap}

/* Question card */
.q-card{background:var(--mid);border-radius:var(--radius);padding:26px 22px;border:1px solid rgba(255,255,255,.06);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.q-cat{font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;text-transform:uppercase}
.q-text{font-size:18px;font-weight:600;line-height:1.6;margin-bottom:22px}
.options{display:flex;flex-direction:column;gap:10px}

.opt-btn{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--card);border:2px solid transparent;border-radius:11px;
  padding:14px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;
  line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%
}
.opt-btn:hover{border-color:var(--accent);background:rgba(233,69,96,.13);transform:translateX(3px)}
.opt-letter{
  flex-shrink:0;width:22px;height:22px;background:rgba(255,255,255,.1);
  border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;
  justify-content:center;margin-top:1px
}

/* Result */
#result{text-align:center}
.res-emoji{font-size:100px;line-height:1;margin-bottom:10px;display:block}
.res-code{font-size:12px;letter-spacing:4px;color:var(--gold);margin-bottom:10px}
.res-name{font-size:38px;font-weight:900;margin-bottom:32px}
.res-desc{background:var(--mid);border-radius:var(--radius);padding:22px;text-align:left;border:1px solid rgba(255,255,255,.06);margin-bottom:20px}
.res-desc p{font-size:15px;line-height:1.8;margin-bottom:10px}
.res-desc p:last-child{margin-bottom:0}
.res-quote{background:var(--card);border-left:4px solid var(--gold);border-radius:0 11px 11px 0;padding:15px 18px;font-size:15px;font-style:italic;color:var(--gold);margin-bottom:32px;text-align:left}

.btn-retry{
  display:inline-block;background:transparent;border:2px solid var(--accent);
  color:var(--accent);font-size:15px;font-weight:700;padding:11px 38px;
  border-radius:999px;cursor:pointer;letter-spacing:1px;transition:background .15s,color .15s
}
.btn-retry:hover{background:var(--accent);color:#fff}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease}

@media(max-width:480px){
  header h1{font-size:34px}
  .q-text{font-size:16px}
  .res-emoji{font-size:76px}
  .res-name{font-size:30px}
}
</style>
</head>
<body>

<header>
  <div class="brand">SHANGHAI JIAO TONG UNIVERSITY</div>
  <h1>SJTI</h1>
  <div class="sub">测测你是哪种交大人</div>
</header>

<main>

<!-- 首页 -->
<section id="intro" class="screen active">
  <h2>你在交大，是什么生态位？</h2>
  <p class="desc">31 道题，没有对错，只有真相。</p>
  <p class="desc" style="font-size:13px">根据你的真实习惯和本能反应作答，效果最准。</p>
  <button class="btn-primary" onclick="startQuiz()">开始测试</button>
  <p class="note">约 5 分钟完成</p>
</section>

<!-- 答题 -->
<section id="quiz" class="screen">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-text" id="pText">1 / 31</div>
  </div>
  <div class="q-card" id="qCard">
    <div class="q-text" id="qText"></div>
    <div class="options" id="opts"></div>
  </div>
</section>

<!-- 结果 -->
<section id="result" class="screen">
  <span class="res-emoji" id="rEmoji"></span>
  <div class="res-code" id="rCode"></div>
  <div class="res-name" id="rName"></div>
  <div class="res-desc" id="rDesc"></div>
  <div class="res-quote" id="rQuote"></div>
  <button class="btn-retry" onclick="restart()">再测一次</button>
</section>

</main>

<script>

// ─── 状态 ───────────────────────────────────────────────
let cur = 0;
let sc  = {M:0,X:0,K:0,Y:0,S:0,I:0,R:0,D:0};

// ─── 渲染题目 ─────────────────────────────────────────────
const LETTERS = ['A','B','C','D'];

function renderQ() {
  const q     = Q[cur];
  const total = Q.length;
  const pct   = (cur / total * 100).toFixed(1);

  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = (cur + 1) + ' / ' + total;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.options.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const letter = document.createElement('span');
    letter.className = 'opt-letter';
    letter.textContent = LETTERS[i];
    const txt = document.createElement('span');
    txt.textContent = opt.t;
    btn.appendChild(letter);
    btn.appendChild(txt);
    btn.onclick = function() { pick(opt.s); };
    container.appendChild(btn);
  });

  // 重触动画
  const card = document.getElementById('qCard');
  card.classList.remove('anim');
  void card.offsetWidth;
  card.classList.add('anim');
}

// ─── 选择选项 ─────────────────────────────────────────────
function pick(scores) {
  for (var dim in scores) { sc[dim] += scores[dim]; }
  cur++;
  if (cur < Q.length) {
    renderQ();
  } else {
    showResult();
  }
}

// ─── 计算结果 ─────────────────────────────────────────────
function getType() {
  var mx = sc.M >= sc.X ? 'M' : 'X';
  var ky = sc.K >= sc.Y ? 'K' : 'Y';
  var si = sc.S >= sc.I ? 'S' : 'I';
  var rd = sc.R >= sc.D ? 'R' : 'D';
  return mx + ky + si + rd;
}

function showResult() {
  var key = getType();
  var t   = TYPES[key];

  document.getElementById('rEmoji').textContent = t.emoji;
  document.getElementById('rCode').textContent  = t.code;
  document.getElementById('rName').textContent  = t.name;

  var descEl = document.getElementById('rDesc');
  descEl.innerHTML = t.desc.map(function(p){ return '<p>' + p + '</p>'; }).join('');

  document.getElementById('rQuote').textContent = t.quote;

  showScreen('result');
}

// ─── 工具函数 ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz() {
  cur = 0;
  sc  = {M:0,X:0,K:0,Y:0,S:0,I:0,R:0,D:0};
  showScreen('quiz');
  renderQ();
}

function restart() { showScreen('intro'); }
